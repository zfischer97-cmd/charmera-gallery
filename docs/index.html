<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Charmera</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,300;0,400;0,500;0,600;1,400;1,500&family=Barlow+Condensed:ital,wght@0,600;0,700;1,500;1,600&display=swap" rel="stylesheet">
<style>
  *,
  *::before,
  *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --kodak-gold: #ffb700;
    --kodak-red: #e4002b;
    --kodak-orange: #e85d00;
    --kodak-amber: #f5a623;
    --kodak-green: #7ab648;
    --kodak-blue: #00a3e0;
    --cream-bg: #faf6f0;
    --grid-bg: #f5f3ef;
    --contact-border: #d6d0c6;
    --frame-text: #8a8070;
  }

  html {
    background: var(--cream-bg);
  }

  body {
    font-family: 'Barlow', sans-serif;
    background: var(--cream-bg);
    color: #3a3530;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ─── Header ─── */
  .header {
    background: var(--kodak-gold);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .header-logo {
    width: 38px;
    height: 38px;
    background: var(--kodak-red);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .header-logo span {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 24px;
    color: var(--kodak-gold);
    line-height: 1;
  }

  .header-text {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }

  .header-kodak {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 26px;
    color: var(--kodak-red);
    letter-spacing: 2px;
    text-transform: uppercase;
    line-height: 1;
  }

  .header-charmera {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 500;
    font-style: italic;
    font-size: 18px;
    color: rgba(60, 40, 10, 0.7);
    line-height: 1;
  }

  /* ─── Rainbow Stripe ─── */
  .rainbow-stripe {
    display: flex;
    height: 6px;
    flex-shrink: 0;
  }

  .rainbow-stripe div {
    flex: 1;
  }

  .stripe-red { background: var(--kodak-red); }
  .stripe-orange { background: var(--kodak-orange); }
  .stripe-amber { background: var(--kodak-amber); }
  .stripe-gold { background: var(--kodak-gold); }
  .stripe-green { background: var(--kodak-green); }
  .stripe-blue { background: var(--kodak-blue); }

  /* ─── Grid ─── */
  .grid-container {
    flex: 1;
    background: var(--grid-bg);
    padding: 24px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    max-width: 1200px;
    margin: 0 auto;
  }

  @media (max-width: 900px) {
    .grid { grid-template-columns: repeat(3, 1fr); }
  }

  @media (max-width: 600px) {
    .grid {
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }
    .grid-container { padding: 12px; }
  }

  /* ─── Tile ─── */
  .tile {
    position: relative;
    aspect-ratio: 4 / 3;
    border: 1.5px solid var(--contact-border);
    border-radius: 2px;
    overflow: hidden;
    cursor: pointer;
    background: #e8e4dd;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
  }

  .tile:hover {
    border-color: var(--kodak-gold);
    box-shadow: 0 0 0 1.5px var(--kodak-gold);
  }

  .tile img,
  .tile video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .tile-frame {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 4px 8px;
    background: linear-gradient(to top, rgba(30, 25, 18, 0.65) 0%, transparent 100%);
    pointer-events: none;
  }

  .tile-frame span {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 11px;
    color: rgba(255, 255, 255, 0.75);
    letter-spacing: 0.5px;
  }

  /* ─── Video Play Overlay ─── */
  .tile-play {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 44px;
    height: 44px;
    background: rgba(20, 16, 10, 0.6);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    transition: background 0.2s ease;
  }

  .tile:hover .tile-play {
    background: rgba(20, 16, 10, 0.8);
  }

  .tile-play svg {
    width: 18px;
    height: 18px;
    fill: #fff;
    margin-left: 2px;
  }

  /* ─── Rotation ─── */
  .rot-0 { transform: rotate(0deg); }
  .rot-90 { transform: rotate(90deg); }
  .rot-180 { transform: rotate(180deg); }
  .rot-270 { transform: rotate(270deg); }

  .tile .rot-90,
  .tile .rot-270 {
    width: 133.33%;
    height: 133.33%;
    position: absolute;
    top: 50%;
    left: 50%;
  }

  .tile .rot-90 {
    transform: translate(-50%, -50%) rotate(90deg);
  }

  .tile .rot-270 {
    transform: translate(-50%, -50%) rotate(270deg);
  }

  .tile .rot-180 {
    transform: rotate(180deg);
  }

  /* ─── Empty State ─── */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 24px;
    text-align: center;
  }

  .empty-icon {
    width: 64px;
    height: 64px;
    background: var(--contact-border);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
  }

  .empty-icon svg {
    width: 32px;
    height: 32px;
    fill: var(--frame-text);
  }

  .empty-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 22px;
    color: var(--frame-text);
    margin-bottom: 8px;
  }

  .empty-subtitle {
    font-size: 14px;
    color: var(--frame-text);
    opacity: 0.7;
    max-width: 320px;
    line-height: 1.5;
  }

  /* ─── Footer ─── */
  .footer {
    background: var(--kodak-gold);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }

  .footer-count {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 13px;
    color: rgba(60, 40, 10, 0.8);
    letter-spacing: 0.5px;
  }

  .footer-tagline {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 500;
    font-style: italic;
    font-size: 13px;
    color: rgba(60, 40, 10, 0.6);
  }

  /* ─── Lightbox ─── */
  .lightbox {
    position: fixed;
    inset: 0;
    z-index: 1000;
    background: rgba(8, 6, 3, 0.96);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.25s ease;
  }

  .lightbox.active {
    display: flex;
    opacity: 1;
  }

  .lightbox.fade-in {
    opacity: 1;
  }

  .lb-close {
    position: absolute;
    top: 16px;
    right: 20px;
    width: 40px;
    height: 40px;
    background: none;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1010;
    opacity: 0.6;
    transition: opacity 0.2s ease;
  }

  .lb-close:hover {
    opacity: 1;
  }

  .lb-close svg {
    width: 24px;
    height: 24px;
    stroke: #fff;
    stroke-width: 2;
    fill: none;
  }

  .lb-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 48px;
    height: 64px;
    background: none;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.5;
    transition: opacity 0.2s ease;
    z-index: 1010;
  }

  .lb-nav:hover {
    opacity: 1;
  }

  .lb-nav svg {
    width: 28px;
    height: 28px;
    stroke: #fff;
    stroke-width: 2;
    fill: none;
  }

  .lb-prev { left: 12px; }
  .lb-next { right: 12px; }

  .lb-media-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px 72px 80px;
    width: 100%;
    overflow: hidden;
  }

  .lb-media-wrap img,
  .lb-media-wrap video {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    border-radius: 2px;
  }

  .lb-info {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 14px 24px;
    background: linear-gradient(to top, rgba(8, 6, 3, 0.9) 0%, transparent 100%);
    display: flex;
    align-items: center;
    justify-content: space-between;
    pointer-events: none;
  }

  .lb-filename {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 14px;
    color: rgba(255, 255, 255, 0.8);
    letter-spacing: 0.5px;
  }

  .lb-date {
    font-size: 13px;
    color: rgba(255, 255, 255, 0.5);
    margin-left: 12px;
  }

  .lb-counter {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 13px;
    color: rgba(255, 255, 255, 0.45);
    letter-spacing: 0.5px;
  }

  @media (max-width: 600px) {
    .lb-media-wrap {
      padding: 50px 16px 70px;
    }
    .lb-prev { left: 4px; }
    .lb-next { right: 4px; }
    .lb-nav { width: 36px; height: 48px; }
    .lb-nav svg { width: 22px; height: 22px; }
  }
</style>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-logo"><span>K</span></div>
    <div class="header-text">
      <span class="header-kodak">KODAK</span>
      <span class="header-charmera">Charmera</span>
    </div>
  </header>

  <!-- Rainbow Stripe -->
  <div class="rainbow-stripe">
    <div class="stripe-red"></div>
    <div class="stripe-orange"></div>
    <div class="stripe-amber"></div>
    <div class="stripe-gold"></div>
    <div class="stripe-green"></div>
    <div class="stripe-blue"></div>
  </div>

  <!-- Grid / Empty State -->
  <main class="grid-container" id="main">
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">
        <svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
      </div>
      <div class="empty-title">No photos yet</div>
      <div class="empty-subtitle">Connect your Kodak Charmera and import some shots. They'll appear here automatically.</div>
    </div>
    <div class="grid" id="grid" style="display:none;"></div>
  </main>

  <!-- Footer Rainbow Stripe -->
  <div class="rainbow-stripe">
    <div class="stripe-red"></div>
    <div class="stripe-orange"></div>
    <div class="stripe-amber"></div>
    <div class="stripe-gold"></div>
    <div class="stripe-green"></div>
    <div class="stripe-blue"></div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <span class="footer-count" id="footer-count"></span>
    <span class="footer-tagline">Shot on Charmera</span>
  </footer>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <button class="lb-close" id="lb-close" aria-label="Close">
      <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <button class="lb-nav lb-prev" id="lb-prev" aria-label="Previous">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <button class="lb-nav lb-next" id="lb-next" aria-label="Next">
      <svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg>
    </button>
    <div class="lb-media-wrap" id="lb-media"></div>
    <div class="lb-info">
      <div>
        <span class="lb-filename" id="lb-filename"></span>
        <span class="lb-date" id="lb-date"></span>
      </div>
      <span class="lb-counter" id="lb-counter"></span>
    </div>
  </div>

<script>
(function () {
  'use strict';

  let items = [];
  let currentIndex = -1;

  // ─── Fetch & Render ───
  fetch('data.json')
    .then(function (r) { return r.json(); })
    .then(function (data) {
      // Sort newest first
      items = data.slice().sort(function (a, b) {
        return new Date(b.timestamp) - new Date(a.timestamp);
      });
      render();
    })
    .catch(function () {
      items = [];
      render();
    });

  function render() {
    var grid = document.getElementById('grid');
    var empty = document.getElementById('empty-state');
    var footerCount = document.getElementById('footer-count');

    if (items.length === 0) {
      empty.style.display = '';
      grid.style.display = 'none';
      footerCount.textContent = '';
      return;
    }

    empty.style.display = 'none';
    grid.style.display = '';

    var photos = 0;
    var videos = 0;

    items.forEach(function (item, idx) {
      if (item.type === 'video') { videos++; } else { photos++; }

      var tile = document.createElement('div');
      tile.className = 'tile';
      tile.setAttribute('role', 'button');
      tile.setAttribute('tabindex', '0');
      tile.setAttribute('aria-label', item.filename);

      var rotClass = 'rot-' + (item.rotation || 0);
      var mediaUrl = item.url || ('media/' + item.filename);

      if (item.type === 'video') {
        var vid = document.createElement('video');
        vid.src = mediaUrl;
        vid.className = rotClass;
        vid.preload = 'metadata';
        vid.muted = true;
        vid.playsInline = true;
        // Seek to first frame for preview
        vid.addEventListener('loadeddata', function () {
          vid.currentTime = 0.01;
        });
        tile.appendChild(vid);

        // Play icon overlay
        var playOverlay = document.createElement('div');
        playOverlay.className = 'tile-play';
        playOverlay.innerHTML = '<svg viewBox="0 0 24 24"><polygon points="8,5 20,12 8,19"/></svg>';
        tile.appendChild(playOverlay);
      } else {
        var img = document.createElement('img');
        img.src = mediaUrl;
        img.alt = item.filename;
        img.className = rotClass;
        img.loading = 'lazy';
        tile.appendChild(img);
      }

      // Frame number
      var frame = document.createElement('div');
      frame.className = 'tile-frame';
      frame.innerHTML = '<span>' + item.filename + '</span>';
      tile.appendChild(frame);

      // Click handler
      tile.addEventListener('click', function () { openLightbox(idx); });
      tile.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          openLightbox(idx);
        }
      });

      grid.appendChild(tile);
    });

    // Footer count
    var parts = [];
    if (photos > 0) { parts.push(photos + ' photo' + (photos !== 1 ? 's' : '')); }
    if (videos > 0) { parts.push(videos + ' video' + (videos !== 1 ? 's' : '')); }
    footerCount.textContent = parts.join(' \u00b7 ');
  }

  // ─── Lightbox ───
  var lightbox = document.getElementById('lightbox');
  var lbMedia = document.getElementById('lb-media');
  var lbFilename = document.getElementById('lb-filename');
  var lbDate = document.getElementById('lb-date');
  var lbCounter = document.getElementById('lb-counter');

  function openLightbox(idx) {
    currentIndex = idx;
    showItem();
    lightbox.classList.add('active');
    // Trigger reflow then fade in
    void lightbox.offsetWidth;
    lightbox.classList.add('fade-in');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    lightbox.classList.remove('fade-in');
    // Stop any playing video
    var vid = lbMedia.querySelector('video');
    if (vid) { vid.pause(); }
    setTimeout(function () {
      lightbox.classList.remove('active');
      lbMedia.innerHTML = '';
      document.body.style.overflow = '';
    }, 250);
    currentIndex = -1;
  }

  function showItem() {
    if (currentIndex < 0 || currentIndex >= items.length) return;
    var item = items[currentIndex];

    // Stop any previous video
    var prevVid = lbMedia.querySelector('video');
    if (prevVid) { prevVid.pause(); }

    lbMedia.innerHTML = '';

    var rotClass = 'rot-' + (item.rotation || 0);
    var mediaUrl = item.url || ('media/' + item.filename);

    if (item.type === 'video') {
      var vid = document.createElement('video');
      vid.src = mediaUrl;
      vid.className = rotClass;
      vid.controls = true;
      vid.autoplay = true;
      vid.playsInline = true;
      vid.style.maxWidth = '100%';
      vid.style.maxHeight = '100%';
      lbMedia.appendChild(vid);
    } else {
      var img = document.createElement('img');
      img.src = mediaUrl;
      img.alt = item.filename;
      img.className = rotClass;
      lbMedia.appendChild(img);
    }

    lbFilename.textContent = item.filename;
    lbDate.textContent = formatDate(item.timestamp);
    lbCounter.textContent = (currentIndex + 1) + ' / ' + items.length;
  }

  function navigate(dir) {
    if (items.length === 0) return;
    currentIndex = (currentIndex + dir + items.length) % items.length;
    showItem();
  }

  function formatDate(ts) {
    if (!ts) return '';
    var d = new Date(ts);
    var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
  }

  // Event listeners
  document.getElementById('lb-close').addEventListener('click', closeLightbox);
  document.getElementById('lb-prev').addEventListener('click', function () { navigate(-1); });
  document.getElementById('lb-next').addEventListener('click', function () { navigate(1); });

  // Click outside media to close
  lbMedia.addEventListener('click', function (e) {
    if (e.target === lbMedia) { closeLightbox(); }
  });

  document.addEventListener('keydown', function (e) {
    if (currentIndex < 0) return;
    if (e.key === 'Escape') { closeLightbox(); }
    else if (e.key === 'ArrowLeft') { navigate(-1); }
    else if (e.key === 'ArrowRight') { navigate(1); }
  });
})();
</script>

</body>
</html>
